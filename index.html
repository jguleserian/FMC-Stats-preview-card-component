<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stats preview card component challenge on Frontend Mentor"
    />
    <meta
      name="keywords"
      content="HTML, CSS, responsive design, frontend mentor challenge"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <meta
      rel="preload"
      href="./assets/fonts/static/Inter-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <meta
      rel="preload"
      href="./assets/fonts/static/Inter-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <meta
      rel="preload"
      href="./assets/fonts/static/LexendDeca-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <title>Frontend Mentor | Stats preview card component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <p
          class="header__figure-text header__screen-reader-only"
          alt="A picture of three business women working on laptops at a worktable."
        ></p>
      </header>
      <section class="content">
        <h1 class="content__title">
          Get <span class="content__title--highlight">insights</span> that help
          your business grow.
        </h1>
        <p class="content__description">
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <ul class="content__stats">
          <li>
            <span class="stats__number">10k+</span>
            <span class="stats__text">companies</span>
          </li>
          <li>
            <span class="stats__number">314</span>
            <span class="stats__text">templates</span>
          </li>
          <li>
            <span class="stats__number">12m+</span>
            <span class="stats__text">queries</span>
          </li>
        </ul>
      </section>
      <footer class="card__attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          rel="noopener noreferrer"
          >Frontend Mentor</a
        >. Coded by
        <a
          href="https://www.frontendmentor.io/profile/jguleserian
"
          rel="noopener noreferrer"
          >Jeff Guleserian</a
        >.
      </footer>
    </main>
  </body>
</html>
